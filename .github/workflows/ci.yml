name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install LLVM Toolchain (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm clang
      - name: Install LLVM Toolchain (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew update
          brew install llvm
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"
      - name: Install LLVM Toolchain (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install llvm --yes --no-progress
          $searchRoots = @(
            "C:\Program Files",
            "C:\Program Files (x86)",
            "C:\LLVM",
            "$env:ChocolateyInstall\lib"
          ) | Where-Object { $_ -and (Test-Path $_) }

          $toolNames = @("llvm-as.exe", "llc.exe", "opt.exe", "clang.exe")
          $toolDirs = New-Object System.Collections.Generic.HashSet[string]

          foreach ($toolName in $toolNames) {
            $toolPath = $null
            foreach ($root in $searchRoots) {
              $found = Get-ChildItem -Path $root -Filter $toolName -Recurse -File -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($found) {
                $toolPath = $found.FullName
                break
              }
            }

            if (-not $toolPath) {
              throw "Could not locate $toolName after Chocolatey llvm install"
            }

            $toolDir = Split-Path $toolPath -Parent
            $null = $toolDirs.Add($toolDir)
          }

          foreach ($toolDir in $toolDirs) {
            Add-Content -Path $env:GITHUB_PATH -Value $toolDir
          }
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format Check
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Run Workspace Tests
        run: cargo test --workspace
      - name: Check Native Toolchain (Unix)
        if: runner.os != 'Windows'
        run: |
          llvm-as --version
          llc --version
          clang --version
      - name: Check Native Toolchain (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          llvm-as --version
          llc --version
          clang --version
      - name: Native Codegen Smoke Test
        run: cargo test -p skeplib codegen_builds_native_executable_for_int_program -- --exact
      - name: CLI Native Build Run Smoke Test
        run: cargo test -p skepac build_native_writes_executable_and_runs -- --exact
      - name: Build Release CLI
        run: cargo build --release -p skepac
