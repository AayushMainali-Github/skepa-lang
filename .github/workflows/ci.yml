name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format Check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Run Workspace Tests
        run: cargo test --workspace
      - name: Build Release Bench Targets
        run: cargo build --release -p skepac -p skepabench
      - name: Run Release Benchmark Compare
        run: cargo run --release -p skepabench -- --profile release --compare
